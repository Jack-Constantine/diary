<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>温馨日记 · 登录</title>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <!-- GSAP (optional) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    :root{
      --cream:#FFF7E6;
      --peach:#FFD7C2;
      --rose:#FFB7C8;
      --latte:#CFAF8B;
      --cocoa:#6B4E3D;
      --ink:#2F2A28;
      --shadow: 0 18px 60px rgba(64, 43, 28, .18);
    }

    html, body { height: 100%; }
    body{
      margin:0;
      font-family: system-ui,-apple-system,"Noto Sans SC",Segoe UI,Roboto,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
      color: rgba(47,42,40,.88);
      overflow:hidden;
      background: radial-gradient(1200px 800px at 20% 10%, #fff7f0 0%, #fff2e8 35%, #ffeef1 70%, #fdeff7 100%);
    }

    .bokeh{
      position: fixed; inset:0; z-index:0; pointer-events:none;
      background:
        radial-gradient(120px 120px at 12% 18%, rgba(255, 216, 194, .55), transparent 65%),
        radial-gradient(180px 180px at 82% 22%, rgba(255, 183, 200, .45), transparent 70%),
        radial-gradient(140px 140px at 75% 78%, rgba(255, 247, 230, .65), transparent 70%),
        radial-gradient(220px 220px at 20% 82%, rgba(207, 175, 139, .25), transparent 72%);
      mix-blend-mode: screen;
      filter: blur(2px);
      opacity:.9;
      animation: bokehFloat 8s ease-in-out infinite alternate;
    }
    @keyframes bokehFloat{
      from{ transform: translate3d(0,0,0) scale(1); }
      to  { transform: translate3d(0,-12px,0) scale(1.02); }
    }

    .grain{
      position: fixed; inset:0; z-index:1; pointer-events:none;
      background-image: url("https://images.unsplash.com/photo-1528459105426-b9548367069b?auto=format&fit=crop&w=1200&q=60");
      background-size: 240px 240px;
      opacity: .04;
      mix-blend-mode: multiply;
      filter: blur(0.35px) saturate(0.85);
      animation: grainMove 7s linear infinite;
    }
    @keyframes grainMove{
      0%{ transform: translate(0,0); }
      25%{ transform: translate(-2%, 1%); }
      50%{ transform: translate(-3%, -1%); }
      75%{ transform: translate(1%, -2%); }
      100%{ transform: translate(0,0); }
    }

    .vignette{
      position: fixed; inset:0; z-index:2; pointer-events:none;
      background:
        radial-gradient(1200px 800px at 50% 40%, rgba(255,255,255,.0), rgba(255, 183, 200, .08) 60%, rgba(107, 78, 61, .12) 100%);
    }

    .wrap{
      position: relative;
      z-index: 3;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:min(560px, 100%);
      border-radius: 28px;
      position:relative;
      box-shadow: var(--shadow);
      background: linear-gradient(180deg, rgba(255, 255, 255, .70), rgba(255, 255, 255, .45));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow:hidden;
      border: 1px solid rgba(255, 255, 255, .55);
      padding: 22px;
    }

    .card::before{
      content:"";
      position:absolute; inset:-2px;
      border-radius: 30px;
      padding:2px;
      background: conic-gradient(from 90deg, rgba(255,139,167,.65), rgba(255,216,194,.55), rgba(255,247,230,.75), rgba(255,183,200,.55), rgba(255,139,167,.65));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity:.9;
      animation: ringSpin 8s linear infinite;
      pointer-events:none;
    }
    @keyframes ringSpin{ to{ transform: rotate(360deg); } }

    .card::after{
      content:"";
      position:absolute; inset:0;
      border-radius: 28px;
      background:
        radial-gradient(700px 420px at 25% 20%, rgba(255, 183, 200, .22), transparent 60%),
        radial-gradient(680px 460px at 85% 85%, rgba(255, 216, 194, .20), transparent 65%);
      pointer-events:none;
    }

    .chip{
      position: relative;
      z-index: 1;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .55);
      border: 1px solid rgba(255,255,255,.60);
      box-shadow: 0 10px 30px rgba(255, 183, 200, .10);
      color: rgba(107,78,61,.92);
      font-weight: 900;
      letter-spacing: .2px;
    }
    .chip .dot{
      width:10px; height:10px;
      border-radius:999px;
      background: radial-gradient(circle, rgba(255,255,255,.9), rgba(255,139,167,.9));
      box-shadow: 0 0 0 6px rgba(255, 183, 200, .20);
      animation: pulse 2.8s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{ transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 183, 200, .16); }
      50%{ transform: scale(1.08); box-shadow: 0 0 0 10px rgba(255, 183, 200, .10); }
    }

    h1{
      position: relative; z-index: 1;
      margin: 14px 0 8px;
      font-size: 22px;
      color: rgba(107,78,61,.95);
      letter-spacing: .2px;
    }
    p{
      position: relative; z-index: 1;
      margin: 0 0 16px;
      opacity:.78;
      line-height:1.6;
    }

    .field{
      position: relative; z-index: 1;
      display:flex;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.55);
      border: 1px solid rgba(255,255,255,.65);
      box-shadow: 0 18px 40px rgba(64,43,28,.10);
    }
    .field i{
      color: rgba(255,139,167,.95);
      filter: drop-shadow(0 10px 18px rgba(255,139,167,.18));
    }
    input{
      width:100%;
      border:0;
      outline:none;
      background: transparent;
      color: rgba(47,42,40,.88);
      font-size: 14px;
      letter-spacing: .2px;
    }
    input::placeholder{ color: rgba(47,42,40,.45); }

    .btn{
      position: relative; z-index: 1;
      margin-top: 12px;
      width: 100%;
      padding: 12px 14px;
      border-radius: 18px;
      border: 0;
      cursor: pointer;
      font-size: 14px;
      font-weight: 950;
      letter-spacing: .3px;
      color: rgba(107,78,61,.95);
      background: linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,183,200,.18));
      box-shadow: 0 18px 36px rgba(255, 139, 167, .18);
      transition: transform .16s ease, box-shadow .16s ease, filter .16s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }
    .btn:hover{
      transform: translateY(-1px);
      box-shadow: 0 24px 44px rgba(255, 139, 167, .22);
      filter: saturate(1.05);
    }
    .btn:active{ transform: translateY(0) scale(.99); }
    .btn:disabled{ opacity:.62; cursor:not-allowed; transform:none; }

    .msg{
      position: relative; z-index: 1;
      margin-top: 12px;
      min-height: 20px;
      font-size: 13px;
      color: rgba(206, 74, 96, .95);
      font-weight: 800;
    }

    .meta{
      position: relative; z-index: 1;
      margin-top: 10px;
      font-size: 12px;
      color: rgba(47,42,40,.58);
      display:flex;
      gap:10px;
      flex-wrap: wrap;
      align-items:center;
    }
    code{
      padding:2px 6px;
      border-radius: 10px;
      background: rgba(255,255,255,.55);
      border: 1px solid rgba(255,255,255,.65);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }

    .fadeInUp{ opacity:0; transform: translateY(14px); }
  </style>
</head>

<body>
  <div class="bokeh"></div>
  <div class="grain"></div>
  <div class="vignette"></div>

  <div class="wrap">
    <div class="card fadeInUp" id="card">
      <div class="chip">
        <span class="dot"></span>
        <span><i class="fa-solid fa-mug-hot"></i> 温馨日记 · 登录</span>
      </div>

      <h1>请输入密码</h1>
      <p>将通过 <code>verifier.enc</code> 验证密码是否正确，验证通过后进入目录。</p>

      <div class="field">
        <i class="fa-solid fa-key"></i>
        <input id="pw" type="password" placeholder="Password" autocomplete="current-password" />
      </div>

      <button class="btn" id="btn"><i class="fa-solid fa-lock-open"></i> 解锁进入</button>
      <div class="msg" id="msg"></div>

    </div>
  </div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);

  // ====== Config ======
  const PW_KEY = "DIARY_PW";
  const VERIFY_URL = "./verifier.enc";      // ✅ 你要放在同目录的 verifier.enc
  const NEXT_URL = "./viewer.html";         // ✅ 进入目录/阅读都在 viewer.html 内完成

  // ====== Crypto helpers ======
  function b64ToBytes(b64){
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    return bytes;
  }

  async function deriveKey(password, saltBytes){
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
      {name:"PBKDF2", salt:saltBytes, iterations:200000, hash:"SHA-256"},
      baseKey,
      {name:"AES-GCM", length:256},
      false,
      ["decrypt"]
    );
  }

  async function verifyPasswordWithEnc(url, password){
    const res = await fetch(url, {cache:"no-store"});
    if(!res.ok) throw new Error("未找到 verifier.enc（请确认已上传同目录）");

    const payload = await res.json();

    // 兼容两种 enc 格式：
    // A) 旧格式：{salt, nonce, tag, ct}
    // B) 新格式：{salt, nonce, data} 其中 data 已包含 tag
    const salt  = b64ToBytes(payload.salt);
    const nonce = b64ToBytes(payload.nonce);

    let data;
    if(payload.data){
      data = b64ToBytes(payload.data);
    }else{
      const tag = b64ToBytes(payload.tag);
      const ct  = b64ToBytes(payload.ct);
      data = new Uint8Array(ct.length + tag.length);
      data.set(ct, 0);
      data.set(tag, ct.length);
    }

    const key = await deriveKey(password, salt);
    // 只要能成功 decrypt 即表示密码正确
    await crypto.subtle.decrypt({name:"AES-GCM", iv:nonce}, key, data);
  }

  async function unlock(){
    $("msg").textContent = "";
    $("btn").disabled = true;

    try{
      const pw = $("pw").value || "";
      if(!pw) throw new Error("请输入密码");

      // ✅ 登录处直接验证密码
      await verifyPasswordWithEnc(VERIFY_URL, pw);

      // ✅ 保存密码到会话（同标签页有效）
      sessionStorage.setItem(PW_KEY, pw);

      // ✅ 进入 viewer（它会显示目录）
      window.location.href = NEXT_URL;

    }catch(e){
      console.warn(e);
      $("msg").textContent = "解锁失败：密码不正确或 verifier.enc 缺失/损坏";
      $("btn").disabled = false;
    }
  }

  $("btn").addEventListener("click", unlock);
  $("pw").addEventListener("keydown", (e)=>{ if(e.key==="Enter") unlock(); });

  // 入场动画
  if(window.gsap){
    gsap.to("#card", {opacity:1, y:0, duration:.75, ease:"power3.out", delay:.08});
  }else{
    $("card").classList.remove("fadeInUp");
  }
})();
</script>
</body>
</html>
