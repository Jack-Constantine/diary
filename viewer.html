<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>温馨日记 · 目录</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    :root{
      --cream:#FFF7E6; --peach:#FFD7C2; --rose:#FFB7C8; --latte:#CFAF8B; --cocoa:#6B4E3D; --ink:#2F2A28;
      --shadow: 0 18px 60px rgba(64, 43, 28, .18);
    }
    html, body { height: 100%; }
    body{
      margin:0;
      font-family: system-ui,-apple-system,"Noto Sans SC",Segoe UI,Roboto,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
      color: rgba(47,42,40,.88);
      overflow:hidden;
      background: radial-gradient(1200px 800px at 20% 10%, #fff7f0 0%, #fff2e8 35%, #ffeef1 70%, #fdeff7 100%);
    }
    .bokeh{
      position: fixed; inset:0; z-index:0; pointer-events:none;
      background:
        radial-gradient(120px 120px at 12% 18%, rgba(255, 216, 194, .55), transparent 65%),
        radial-gradient(180px 180px at 82% 22%, rgba(255, 183, 200, .45), transparent 70%),
        radial-gradient(140px 140px at 75% 78%, rgba(255, 247, 230, .65), transparent 70%),
        radial-gradient(220px 220px at 20% 82%, rgba(207, 175, 139, .25), transparent 72%);
      mix-blend-mode: screen;
      filter: blur(2px);
      opacity:.9;
      animation: bokehFloat 8s ease-in-out infinite alternate;
    }
    @keyframes bokehFloat{ from{ transform: translate3d(0,0,0) scale(1); } to{ transform: translate3d(0,-12px,0) scale(1.02);} }

    .grain{
      position: fixed; inset:0; z-index:1; pointer-events:none;
      background-image: url("https://images.unsplash.com/photo-1528459105426-b9548367069b?auto=format&fit=crop&w=1200&q=60");
      background-size: 240px 240px;
      opacity: .04;
      mix-blend-mode: multiply;
      filter: blur(0.35px) saturate(0.85);
      animation: grainMove 7s linear infinite;
    }
    @keyframes grainMove{
      0%{ transform: translate(0,0); } 25%{ transform: translate(-2%, 1%); }
      50%{ transform: translate(-3%, -1%); } 75%{ transform: translate(1%, -2%); } 100%{ transform: translate(0,0); }
    }

    .vignette{
      position: fixed; inset:0; z-index:2; pointer-events:none;
      background: radial-gradient(1200px 800px at 50% 40%, rgba(255,255,255,.0), rgba(255, 183, 200, .08) 60%, rgba(107, 78, 61, .12) 100%);
    }

    .wrap{ position: relative; z-index: 3; height:100%; display:grid; place-items:center; padding: 18px; }

    .card{
      width: min(1180px, 96vw);
      height: 84vh;
      border-radius: 28px;
      position:relative;
      box-shadow: var(--shadow);
      background: linear-gradient(180deg, rgba(255, 255, 255, .70), rgba(255, 255, 255, .45));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow:hidden;
      border: 1px solid rgba(255, 255, 255, .55);
      opacity: 1;
    }
    .card::before{
      content:"";
      position:absolute; inset:-2px;
      border-radius: 30px;
      padding:2px;
      background: conic-gradient(from 90deg, rgba(255,139,167,.65), rgba(255,216,194,.55), rgba(255,247,230,.75), rgba(255,183,200,.55), rgba(255,139,167,.65));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity:.9;
      animation: ringSpin 8s linear infinite;
      pointer-events:none;
    }
    @keyframes ringSpin{ to{ transform: rotate(360deg);} }
    .card::after{
      content:"";
      position:absolute; inset:0;
      border-radius: 28px;
      background:
        radial-gradient(900px 520px at 25% 15%, rgba(255, 183, 200, .22), transparent 60%),
        radial-gradient(860px 540px at 85% 85%, rgba(255, 216, 194, .20), transparent 65%);
      pointer-events:none;
    }

    .topbar{
      position:absolute; left:18px; right:18px; top:16px;
      display:flex; align-items:center; justify-content:space-between; gap: 12px;
      z-index:6;
    }
    .chip{
      display:inline-flex; align-items:center; gap:10px;
      padding: 10px 14px; border-radius: 999px;
      background: rgba(255, 255, 255, .55);
      border: 1px solid rgba(255,255,255,.55);
      box-shadow: 0 10px 30px rgba(255, 183, 200, .10);
      color: rgba(107,78,61,.92);
      font-weight: 950; letter-spacing: .2px;
      white-space: nowrap;
    }
    .chip .dot{
      width:10px; height:10px; border-radius:999px;
      background: radial-gradient(circle, rgba(255,255,255,.9), rgba(255,139,167,.9));
      box-shadow: 0 0 0 6px rgba(255, 183, 200, .20);
      animation: pulse 2.8s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{ transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 183, 200, .16); }
      50%{ transform: scale(1.08); box-shadow: 0 0 0 10px rgba(255, 183, 200, .10); }
    }

    .paper{
      position:absolute;
      inset: 66px 22px 22px 22px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .68), rgba(255, 255, 255, .38)),
        radial-gradient(1600px 820px at 10% 0%, rgba(255, 216, 194, .25), transparent 55%),
        radial-gradient(1500px 820px at 90% 100%, rgba(255, 183, 200, .22), transparent 55%);
      border: 1px solid rgba(255, 255, 255, .55);
      overflow:hidden;
      z-index:5;
      display:grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      padding: 18px;
      height: calc(84vh - 66px - 22px);
      min-height: 0;
    }

    .titleRow{ display:flex; align-items:flex-start; justify-content:space-between; gap: 12px; }
    .h1{
      font-size: 22px; font-weight: 950; color: rgba(107,78,61,.95);
      letter-spacing:.2px; display:flex; align-items:center; gap: 10px;
    }
    .sub{ margin-top: 4px; font-size: 12px; color: rgba(47,42,40,.62); line-height: 1.35; }

    .controls{ display:flex; gap: 10px; align-items:center; flex-wrap: wrap; }
    .field{
      display:flex; align-items:center; gap: 10px;
      padding: 10px 12px;
      border-radius: 18px;
      background: rgba(255,255,255,.55);
      border: 1px solid rgba(255,255,255,.65);
      box-shadow: 0 18px 40px rgba(64,43,28,.10);
      min-width: 260px;
      flex: 1;
    }
    .field i{ color: rgba(255,139,167,.95); }
    input{
      width:100%; border:0; outline:none; background: transparent;
      color: rgba(47,42,40,.88); font-size: 13.5px; letter-spacing: .2px;
    }
    input::placeholder{ color: rgba(47,42,40,.45); }

    .btn{
      padding: 10px 12px;
      border-radius: 18px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 950;
      letter-spacing: .2px;
      color: rgba(107,78,61,.95);
      background: rgba(255,255,255,.55);
      border: 1px solid rgba(255,255,255,.65);
      box-shadow: 0 18px 40px rgba(64,43,28,.10);
      transition: transform .16s ease, box-shadow .16s ease;
      white-space: nowrap;
      display:inline-flex;
      align-items:center;
      gap: 8px;
    }
    .btn.primary{
      background: linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,183,200,.18));
      border: 0;
      box-shadow: 0 18px 36px rgba(255, 139, 167, .18);
    }
    .btn:hover{ transform: translateY(-1px); }
    .btn:active{ transform: translateY(0) scale(.99); }

    .list{
      border-radius: 22px;
      background: rgba(255,255,255,.40);
      border: 1px solid rgba(255,255,255,.60);
      overflow: hidden;
      min-height: 0;
      display:flex;
      flex-direction: column;
    }
    .listHead{
      padding: 12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,.55);
    }
    .listHead .hint{ font-size: 12px; color: rgba(47,42,40,.58); }
    .scroll{
      padding: 12px;
      overflow:auto;
      min-height: 0;
      scrollbar-gutter: stable;
    }
    .scroll::-webkit-scrollbar{ width: 10px; }
    .scroll::-webkit-scrollbar-thumb{
      background: rgba(255,139,167,.25);
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.55);
    }

    .grid{ display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    @media (max-width: 900px){ .grid{ grid-template-columns: 1fr; } }

    .entry{
      width:100%;
      text-align:left;
      border-radius: 22px;
      padding: 12px 12px;
      background: rgba(255,247,230,.82);
      border: 1px solid rgba(255,183,200,.38);
      box-shadow: 0 12px 26px rgba(255,183,200,.14);
      cursor:pointer;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
      display:flex;
      gap: 12px;
      align-items:flex-start;
    }
    .entry:hover{ transform: translateY(-1px); box-shadow: 0 18px 34px rgba(255,183,200,.20); background: rgba(255,255,255,.74); }
    .entry:active{ transform: translateY(0) scale(.99); }

    .icon{
      width: 44px; height: 44px; border-radius: 16px;
      display:grid; place-items:center;
      background: rgba(255,255,255,.65);
      border: 1px solid rgba(255,255,255,.75);
      box-shadow: 0 12px 26px rgba(64,43,28,.08);
      flex: 0 0 auto;
    }
    .icon i{ color: rgba(255,139,167,.95); font-size: 18px; }

    .meta{ min-width: 0; flex: 1; }
    .meta .t{
      font-weight: 950; color: rgba(107,78,61,.92); line-height: 1.15;
      display:flex; align-items:center; gap: 8px; flex-wrap: wrap;
    }
    .meta .d{ margin-top: 6px; font-size: 12px; color: rgba(47,42,40,.62); line-height: 1.35; word-break: break-word; }
    .tag{
      display:inline-flex; align-items:center; gap:6px;
      padding: 6px 10px; border-radius: 999px;
      background: rgba(255,255,255,.60);
      border: 1px solid rgba(255,255,255,.70);
      font-size: 12px; color: rgba(47,42,40,.65); font-weight: 950; white-space: nowrap;
    }
    .tag i{ color: rgba(255,139,167,.9); }

    .msg{ min-height: 18px; font-size: 13px; color: rgba(206, 74, 96, .95); font-weight: 850; }

    code.badgecode{
      padding:2px 6px; border-radius: 10px;
      background: rgba(255,255,255,.55);
      border: 1px solid rgba(255,255,255,.65);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="bokeh"></div>
  <div class="grain"></div>
  <div class="vignette"></div>

  <div class="wrap">
    <div class="card" id="card">
      <div class="topbar">
        <div class="chip"><span class="dot"></span><span><i class="fa-solid fa-book-heart"></i> 温馨日记 · 目录</span></div>
        <div class="chip"><span class="text-xs" id="nowText">加载中…</span></div>
      </div>

      <div class="paper" id="paper">
        <div class="titleRow">
          <div>
            <div class="h1"><i class="fa-solid fa-feather-pointed"></i> 日记目录</div>
          </div>
          <div class="controls">
            <button class="btn" id="btnLogout" type="button"><i class="fa-solid fa-arrow-right-from-bracket"></i> 退出</button>
          </div>
        </div>

        <div class="controls">
          <div class="field">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="q" placeholder="搜索：标题 / 日期 / 关键词（如 202602）" />
          </div>
          <button class="btn primary" id="btnNewest" type="button"><i class="fa-solid fa-arrow-up-wide-short"></i> 最新在前</button>
          <button class="btn" id="btnOldest" type="button"><i class="fa-solid fa-arrow-down-short-wide"></i> 最旧在前</button>
          <button class="btn" id="btnReload" type="button"><i class="fa-solid fa-rotate"></i> 刷新</button>
        </div>

        <div class="list">
          <div class="listHead">
            <div class="hint" id="countText">正在加载目录…</div>
          </div>
          <div class="scroll">
            <div class="grid" id="grid"></div>
            <div class="msg" id="msg"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";
  function $(id){ return document.getElementById(id); }

  var PW_KEY = "DIARY_PW";
  var MANIFEST_URL = "./diary-manifest.json";

  var manifest = [];
  var sortDir = "desc";

  function pad2(n){ return String(n).padStart(2, "0"); }
  function fmtNow(d){
    return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate())+" "+pad2(d.getHours())+":"+pad2(d.getMinutes());
  }

  function dateKeyFromAny(s){
    if(!s) return "";
    s = String(s);
    var m1 = s.match(/^(\d{4})[-\/]?(\d{2})[-\/]?(\d{2})$/);
    if(m1) return m1[1]+m1[2]+m1[3];
    var m2 = s.match(/^(\d{8})$/);
    if(m2) return m2[1];
    return "";
  }

  function ymdToNice(ymd8){
    if(!/^\d{8}$/.test(ymd8)) return ymd8;
    return ymd8.slice(0,4)+"-"+ymd8.slice(4,6)+"-"+ymd8.slice(6,8);
  }

  function escapeHtml(s){
    return String(s == null ? "" : s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function requirePasswordOrBack(){
    var pw = sessionStorage.getItem(PW_KEY);
    if(!pw){
      window.location.href = "./login.html";
      return null;
    }
    return pw;
  }

  function getEncParam(){
    var sp = new URLSearchParams(location.search);
    return sp.get("enc") || "";
  }

  function b64ToBytes(b64){
    var bin = atob(b64);
    var bytes = new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  async function deriveKey(password, saltBytes){
    var enc = new TextEncoder();
    var baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey(
      {name:"PBKDF2", salt:saltBytes, iterations:200000, hash:"SHA-256"},
      baseKey,
      {name:"AES-GCM", length:256},
      false,
      ["decrypt"]
    );
  }

  async function decryptEncJsonToHtml(url, password){
    var res = await fetch(url, {cache:"no-store"});
    if(!res.ok) throw new Error("未找到文件："+url);
    var payload = await res.json();

    var salt = b64ToBytes(payload.salt);
    var nonce = b64ToBytes(payload.nonce);

    var data;
    if(payload.data){
      data = b64ToBytes(payload.data);
    }else{
      var tag = b64ToBytes(payload.tag);
      var ct = b64ToBytes(payload.ct);
      data = new Uint8Array(ct.length + tag.length);
      data.set(ct, 0);
      data.set(tag, ct.length);
    }

    var key = await deriveKey(password, salt);
    var ptBuf = await crypto.subtle.decrypt({name:"AES-GCM", iv:nonce}, key, data);
    return new TextDecoder().decode(ptBuf);
  }

  function injectNav(html){
    var snippet = [
      "\n<!-- injected by viewer.html -->\n",
      "<div id=\"__diary_nav__\" style=\"",
      "position:fixed; left:16px; top:16px; z-index:2147483647;",
      "display:flex; gap:10px; align-items:center;",
      "padding:10px 12px; border-radius:999px;",
      "background: rgba(255,255,255,.60);",
      "border: 1px solid rgba(255,255,255,.70);",
      "backdrop-filter: blur(10px);",
      "box-shadow: 0 18px 40px rgba(64,43,28,.14);",
      "font-family: system-ui,-apple-system,Segoe UI,Roboto,'PingFang SC','Microsoft YaHei',Arial,sans-serif;",
      "\">",
      "<button onclick=\"location.href='./viewer.html'\" style=\"",
      "border:0; cursor:pointer; font-weight:800;",
      "color: rgba(107,78,61,.95);",
      "background: linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,183,200,.18));",
      "padding:10px 12px; border-radius:999px;",
      "box-shadow: 0 12px 26px rgba(255,183,200,.16);",
      "\">← 返回目录</button>",
      "<span style=\"font-size:12px; color: rgba(47,42,40,.62); font-weight:700;\">温馨日记</span>",
      "</div>\n"
    ].join("");

    var m = html.match(/<body[^>]*>/i);
    if(m){
      var idx = m.index + m[0].length;
      return html.slice(0, idx) + snippet + html.slice(idx);
    }
    return snippet + html;
  }

  async function openDiaryFullPage(encName){
    var pw = requirePasswordOrBack();
    if(!pw) return;
    try{
      var html = await decryptEncJsonToHtml(encName, pw);
      var finalHtml = injectNav(html);
      document.open();
      document.write(finalHtml);
      document.close();
    }catch(e){
      console.warn(e);
      alert("打开失败：密码不对 / enc 路径不对 / enc 文件损坏");
      history.replaceState({}, "", "./viewer.html");
      location.reload();
    }
  }

  function render(list){
    var grid = $("grid");
    grid.innerHTML = "";
    if(!list.length){
      $("countText").textContent = "没有匹配的日记（或目录为空）。";
      return;
    }
    $("countText").textContent = "共 " + list.length + " 篇 · " + (sortDir==="desc" ? "最新在前" : "最旧在前");

    list.forEach(function(item){
      var dateKey = dateKeyFromAny(item.date || item.id || "");
      var nice = ymdToNice(dateKey);
      var title = item.title || "未命名日记";
      var desc = item.desc || item.note || "点击进入查看内容";
      var enc = item.enc || (dateKey ? (dateKey + ".enc") : "");

      var btn = document.createElement("button");
      btn.className = "entry";
      btn.type = "button";

      btn.innerHTML = ""
        + "<div class=\"icon\"><i class=\"fa-solid fa-feather-pointed\"></i></div>"
        + "<div class=\"meta\">"
        +   "<div class=\"t\">"
        +     "<span>" + escapeHtml(nice) + "</span>"
        +     "<span class=\"tag\"><i class=\"fa-solid fa-file-shield\"></i>" + escapeHtml(enc.replace(/^\.\//,"")) + "</span>"
        +   "</div>"
        +   "<div class=\"d\"><b>" + escapeHtml(title) + "</b><br>" + escapeHtml(desc) + "</div>"
        + "</div>";

      btn.addEventListener("click", function(){
        window.location.href = "./viewer.html?enc=" + encodeURIComponent(enc);
      });

      grid.appendChild(btn);
    });
  }

  function applyFilter(){
    var qEl = $("q");
    var q = (qEl && qEl.value ? qEl.value : "").trim().toLowerCase();
    var list = manifest.slice();

    list.sort(function(a,b){
      var ka = dateKeyFromAny(a.date || a.id || "");
      var kb = dateKeyFromAny(b.date || b.id || "");
      if(ka === kb) return 0;
      return sortDir === "desc" ? kb.localeCompare(ka) : ka.localeCompare(kb);
    });

    if(q){
      list = list.filter(function(x){
        var dk = dateKeyFromAny(x.date || x.id || "");
        var nice = ymdToNice(dk);
        var enc = String(x.enc || (dk + ".enc")).toLowerCase();
        var blob = (dk + " " + nice + " " + (x.title||"") + " " + (x.desc||x.note||"") + " " + enc).toLowerCase();
        return blob.indexOf(q) >= 0;
      });
    }
    render(list);
  }

  async function loadManifest(){
    $("msg").textContent = "";
    try{
      var res = await fetch(MANIFEST_URL, {cache:"no-store"});
      if(!res.ok) throw new Error("未找到 diary-manifest.json");
      var data = await res.json();
      if(!Array.isArray(data)) throw new Error("diary-manifest.json 必须是数组");

      manifest = data.map(function(x){
        var dk = dateKeyFromAny(x.date || x.id || "");
        return {
          date: dk || x.date || x.id || "",
          title: x.title || "",
          desc: x.desc || x.note || "",
          enc: x.enc || (dk ? (dk + ".enc") : "")
        };
      }).filter(function(x){ return !!x.enc; });

      applyFilter();
    }catch(e){
      console.warn(e);
      $("countText").textContent = "目录加载失败";
      $("msg").textContent = "请检查 diary-manifest.json 是否存在、格式是否正确。";
    }
  }

  function showDirectory(){
    $("nowText").textContent = "此刻：" + fmtNow(new Date());
    setInterval(function(){ $("nowText").textContent = "此刻：" + fmtNow(new Date()); }, 20000);

    $("q").addEventListener("input", applyFilter);

    $("btnNewest").addEventListener("click", function(){
      sortDir="desc";
      $("btnNewest").classList.add("primary");
      $("btnOldest").classList.remove("primary");
      applyFilter();
    });

    $("btnOldest").addEventListener("click", function(){
      sortDir="asc";
      $("btnOldest").classList.add("primary");
      $("btnNewest").classList.remove("primary");
      applyFilter();
    });

    $("btnReload").addEventListener("click", loadManifest);

    $("btnLogout").addEventListener("click", function(){
      sessionStorage.removeItem(PW_KEY);
      window.location.href = "./login.html";
    });

    loadManifest();

    if(window.gsap){
      window.gsap.fromTo("#card", {opacity:0, y:14}, {opacity:1, y:0, duration:.7, ease:"power3.out", delay:.05});
    }
  }

  (function init(){
    var pw = requirePasswordOrBack();
    if(!pw) return;
    var enc = getEncParam();
    if(enc){
      openDiaryFullPage(enc);
      return;
    }
    showDirectory();
  })();
})();
</script>
</body>
</html>
